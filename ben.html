<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ruben Santos — Designer & Lecturer</title>
<style>
  :root {
    --fg: #f5f5f5;
    --bg: #0a0a0a;
    --accent: #ff3b30;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  canvas#bg {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    display: block;
  }

  main {
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 6vw;
    max-width: 900px;
  }

  h1 {
    font-size: clamp(2.5rem, 7vw, 5.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 0.4em;
  }

  h2 {
    font-size: clamp(1rem, 1.6vw, 1.25rem);
    font-weight: 400;
    color: var(--accent);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 1.5em;
  }

  p {
    font-size: clamp(1.05rem, 1.6vw, 1.4rem);
    line-height: 1.5;
    max-width: 38em;
    color: rgba(245, 245, 245, 0.85);
  }

  footer {
    position: fixed;
    bottom: 1.5rem;
    left: 6vw;
    z-index: 1;
    font-size: 0.8rem;
    color: rgba(245, 245, 245, 0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  @media (max-width: 600px) {
    main { padding: 8vw; }
    footer { left: 8vw; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>

<main>
  <h1>Ruben Santos</h1>
  <h2>Designer &amp; Lecturer</h2>
  <p>
    Designer and Lecturer at Escola Superior de Artes e Design, Caldas da Rainha.
    Develops motion design projects for cinema, television, theater and site-specific
    installations. Explores emerging technologies and innovative pedagogical methodologies.
  </p>
</main>

<footer>© <span id="year"></span> Ruben Santos</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');

  let width, height, particles;
  const PARTICLE_COUNT = 90;
  const MAX_DIST = 140;
  const mouse = { x: null, y: null };

  function resize() {
    width = canvas.width = window.innerWidth * devicePixelRatio;
    height = canvas.height = window.innerHeight * devicePixelRatio;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.scale(1, 1);
  }

  function init() {
    resize();
    particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      vx: (Math.random() - 0.5) * 0.6 * devicePixelRatio,
      vy: (Math.random() - 0.5) * 0.6 * devicePixelRatio,
      r: (Math.random() * 1.5 + 0.5) * devicePixelRatio,
    }));
  }

  function step() {
    ctx.fillStyle = 'rgba(10, 10, 10, 0.25)';
    ctx.fillRect(0, 0, width, height);

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0 || p.x > width) p.vx *= -1;
      if (p.y < 0 || p.y > height) p.vy *= -1;

      // mouse attraction
      if (mouse.x !== null) {
        const dx = mouse.x - p.x;
        const dy = mouse.y - p.y;
        const d = Math.hypot(dx, dy);
        if (d < 200 * devicePixelRatio) {
          p.vx += (dx / d) * 0.02;
          p.vy += (dy / d) * 0.02;
        }
      }

      // soft velocity cap
      p.vx = Math.max(-1.2, Math.min(1.2, p.vx));
      p.vy = Math.max(-1.2, Math.min(1.2, p.vy));

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
      ctx.fill();
    }

    // connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.hypot(dx, dy);
        const max = MAX_DIST * devicePixelRatio;
        if (d < max) {
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.strokeStyle = `rgba(255, 59, 48, ${0.25 * (1 - d / max)})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }

    requestAnimationFrame(step);
  }

  window.addEventListener('resize', init);
  window.addEventListener('mousemove', e => {
    mouse.x = e.clientX * devicePixelRatio;
    mouse.y = e.clientY * devicePixelRatio;
  });
  window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });

  init();
  step();
</script>

</body>
</html>
